services:
  postgres:
    image: postgres:16-alpine
    container_name: aquafotos-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aquafotos
    volumes:
      - aquafotos_pgdata:/var/lib/postgresql/data

volumes:
  aquafotos_pgdata:
